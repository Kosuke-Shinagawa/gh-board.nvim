name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install stylua
        uses: JohnnyMorganz/stylua-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          version: latest
          args: --check lua/

      - name: Install luacheck
        run: |
          sudo apt-get update -q
          sudo apt-get install -y luarocks
          sudo luarocks install luacheck

      - name: Run luacheck
        run: luacheck lua/ tests/

      - name: Install Neovim
        uses: rhysd/action-setup-vim@v1
        with:
          neovim: true
          version: stable

      - name: Install plenary.nvim (test dependency)
        run: |
          git clone --depth 1 https://github.com/nvim-lua/plenary.nvim \
            ~/.local/share/nvim/site/pack/vendor/start/plenary.nvim

      - name: Install nui.nvim (runtime dependency)
        run: |
          git clone --depth 1 https://github.com/MunifTanjim/nui.nvim \
            ~/.local/share/nvim/site/pack/vendor/start/nui.nvim

      - name: Run tests
        run: |
          nvim --headless \
            -c "PlenaryBustedDirectory tests/spec/ { minimal_init = 'tests/minimal_init.lua', sequential = true }" \
            -c "qa"
